<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JTB Converter - Java to Bedrock Mod Converter</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <span class="icon">⬛➡️⬛</span>
        <h1>JTB Converter</h1>
      </div>
      <p>Convert Java Edition mods to Bedrock Edition</p>
    </header>

    <main>
      <section class="upload-section">
        <div class="drop-zone" id="drop-zone">
          <input type="file" id="file-input" accept=".jar" hidden>
          <label for="file-input">
            <span class="icon">📦</span>
            <p>Drop your Java mod JAR here<br>or click to browse</p>
          </label>
        </div>
      </section>

      <section class="options-section">
        <button id="convert-btn" disabled>Convert to Bedrock</button>
      </section>

      <section class="output-section">
        <div id="status"></div>
        <div id="download-link" class="hidden">
          <a id="download-url" href="#" download class="btn-primary">Download .mcaddon</a>
        </div>
      </section>
    </main>

    <footer>
      <p>Built with ❤️ by the JTBAPI Team</p>
      <p><a href="https://github.com/jtbapi">GitHub</a> | <a href="#">Documentation</a></p>
    </footer>
  </div>

  <script type="module" src="app.ts"></script>
</body>
</html>
